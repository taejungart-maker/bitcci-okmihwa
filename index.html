<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>옥미화 — 심연의 서사</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Serif KR', 'Nanum Myeongjo', serif;
      background: radial-gradient(circle at 50% 35%, #1a1a20 0%, #0b0b0e 70%);
      color: #e8e4dc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { padding: 2rem; max-width: 540px; }
    .artist {
      font-size: 1.05rem;
      color: #b8a98c;
      letter-spacing: 0.35em;
      margin-bottom: 1.6rem;
      text-transform: none;
    }
    .title {
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 2.4rem;
      color: #f3efe7;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #6b6256;
      margin: 0 auto 2.4rem;
    }
    .msg {
      font-size: 1.02rem;
      line-height: 2;
      color: #c9c2b6;
    }
    .msg .sub {
      display: block;
      margin-top: 1.4rem;
      font-size: 0.88rem;
      color: #8a8377;
      letter-spacing: 0.03em;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #5f594f;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="artist">OK MIHWA</div>
    <div class="title">심연의 서사</div>
    <div class="divider"></div>
    <p class="msg">
      본 웹 화집은 현재 비공개로 전환되어 있습니다.
      <span class="sub">관람을 원하시는 경우 제작자에게 문의해 주시기 바랍니다.</span>
    </p>
    <div class="footer">© Web Catalogue · Privately held</div>
  </div>
</body>
</html>
